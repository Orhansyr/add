   <!-- Isotope Filter Script TÜM HABERLER KISMI , index.html için -->
         <script>
            (function($){
                $(function(){
                    if (typeof $.fn.isotope === 'undefined') {
                        console.warn('Isotope yüklenmemiş. Lütfen isotope.pkgd.min.js yükleyin.');
                        return;
                    }
                    var $grid = $('.featuredContainer').isotope({
                        itemSelector: '.featured-item',
                        layoutMode: 'fitRows'
                    });

                    $('.isotope-classes-tab a').on('click', function(e){
                        e.preventDefault();
                        $('.isotope-classes-tab a').removeClass('current');
                        $(this).addClass('current');
                        var filter = $(this).attr('data-filter');
                        $grid.isotope({ filter: filter });
                    });
                });
            })(jQuery);
            </script>

            
            
      </body>
